<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TOKEN=true有効: 3-Legged OAuth -->
    <script src="https://oacdemo2-orasejapan-nt.analytics.ocp.oraclecloud.com/public/dv/v1/embedding/standalone/embedding.js?IDCS_OAUTH3LEGGED=true" type="application/javascript"></script>
    <title>Sample OAC AI Agent</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f9f9;
        }
        A:link { color:#ffffff; text-decoration: none; }
        A:visited { color:#ffffff; text-decoration: none; }
        A:hover { color:#ffff00; text-decoration: underline; }
        oracle-analytics-assistant {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* サイドバー */
        #sidebar {
            width: 220px;
            background-color: #1e1e1e; /* ダークなGemini風 */
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        /* メインコンテンツエリア */
        #main-content {
            flex-grow: 1; /* 残りの幅をすべて使う */
            overflow-y: auto; /* コンテンツが増えたらここだけスクロール */
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 最初のメッセージを入れるコンテナ */
        .first-message-area {
            width: 100%;
            max-width: 700px;
            background-color: #E9E2DB;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* コードを入れるコンテナ */
        .user-content-area {
            width: 100%;
            max-width: 80%; /* 最大幅 */
            min-width: 700px; /* 最低幅 */
            flex: 1 1 auto; /* 表示位置より下を全部使う */
            overflow: auto;
            background-color: #FFFCF3;
            padding: 10px;
            border-radius: 12px;
            justify-content: center; /* 中央揃え */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .assistant { width: 400px; flex: 0 0 auto; }
        .container { width: calc(80% - 400px); flex: 0 1 auto; }
        h1 { font-size:18px; }
        .menu-item { margin-bottom: 15px; color: #ccc; cursor: pointer; }
        .menu-item:hover { color: white; }
        h2 { font-size:16px; }
        h3 { font-size:14px; }
        html{ font-size:12px; height:100%; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <h3>My Project</h3>
        <div class="menu-item">🏠 <a href="sample.html">ホーム</a></div>
        <div class="menu-item">📜 <a href="c1.html">説明1</a></div>
        <div class="menu-item">🏫 <a href="c2.html">説明2</a></div>
        <div class="menu-item">💰️ <a href="v1.html">売上を分析する</a></div>
        <div class="menu-item">🗾 <a href="v2.html">地図上で分析する</a></div>
        <div class="menu-item">🏄️ <a href="v3.html">トークンを試す</a></div>
        <div class="menu-item">💹 <a href="https://oacdemo2-orasejapan-nt.analytics.ocp.oraclecloud.com/ui/dv" target="_blank">自分で可視化する</a></div>
        <div class="menu-item">⚙️ <a href="">設定</a></div>
   </nav>
    <main id="main-content">
        <div class="user-content-area">
            <oracle-dv class="container" 
                       project-path="/@Catalog/users/takanobu.yoshikawa@oracle.com/ベクトルマップレイヤー" 
                       active-page="canvas"
                       project-options='{"bShowFilterBar":false}'>
            </oracle-dv>
        </div>
    </main>

    <script>
        requirejs(['jquery', 'knockout', 'obitech-application/application', 'ojs/ojcore', 'ojs/ojknockout', 'ojs/ojcomposite', 'jet-composites/oracle-dv/loader'],
            function($, ko, application) {

                // 3-Legged OAuth設定
                application.setSecurityConfig("oauth_3legged");
                ko.applyBindings();
            }
        );
    </script>
</body>
</html>
