<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background-color: #f9f9f9; }
        #sidebar { width: 260px; background-color: #1e1e1e; color: white; padding: 20px; box-sizing: border-box; }
        #main-content { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }

        /* ★ Markdown表示エリアのスタイル（ここを綺麗に！） ★ */
        .user-content-area {
            width: 100%; max-width: 800px; background: white; padding: 40px;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            line-height: 1.8; color: #333;
        }
        /* Markdown内の各要素を装飾 */
        .user-content-area h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #1a73e8; }
        .user-content-area h2 { margin-top: 30px; color: #444; }
        .user-content-area code { background: #f0f0f0; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        .user-content-area pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 8px; overflow-x: auto; }
        .user-content-area blockquote { border-left: 4px solid #1a73e8; margin: 0; padding-left: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h3>My MD Viewer</h3>
        <div style="font-size: 0.8em; color: #888;">Content.md を読み込み中...</div>
    </nav>

    <main id="main-content">
        <div id="content" class="user-content-area">
            Loading...
        </div>
    </main>

    <script>
        // content.md を読み込んで表示する処理
        async function loadMarkdown() {
            const contentDiv = document.getElementById('content');
            try {
                // 1. 同じディレクトリの content.md を取得
                const response = await fetch('content.md');
                
                if (!response.ok) {
                    throw new Error('content.md が見つかりません。ファイル名を確認してください。');
                }

                const markdownText = await response.text();
                
                // 2. Marked.js を使って HTML に変換して流し込む
                contentDiv.innerHTML = marked.parse(markdownText);
                
            } catch (error) {
                contentDiv.innerHTML = `<p style="color:red;">エラー: ${error.message}</p>`;
            }
        }

        // 実行
        loadMarkdown();
    </script>
</body>
</html>
