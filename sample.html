<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://oacdemo2-orasejapan-nt.analytics.ocp.oraclecloud.com/public/dv/v2/embedding/auto/embedding.js" type="application/javascript"></script>
    <!-- script src="https://oacdemo2-orasejapan-nt.analytics.ocp.oraclecloud.com/public/dv/v1/embedding/standalone/embedding.js" type="application/javascript"></script -->
    <title>Sample OAC AI Agent</title>
    <style>
        /* デザイナー注：Flexboxを使って分割しています */
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f9f9;
        }

        A:link { color:#ffffff; text-decoration: underline;}
        A:visited { color:#ffffff;; text-decoration: underline;}
        A:hover { color:#FFFF00; text-decoration: underline;}

        oracle-analytics-assistant {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* サイドバー */
        #sidebar {
            width: 220px;
            background-color: #1e1e1e; /* ダークなGemini風 */
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* メインコンテンツエリア */
        #main-content {
            flex-grow: 1; /* 残りの幅をすべて使う */
            overflow-y: auto; /* コンテンツが増えたらここだけスクロール */
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 最初のメッセージを入れるコンテナ */
        .first-message-area {
            width: 100%;
            max-width: 800px;
            background-color: #E9E2DB;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* コードを入れるコンテナ */
        .user-content-area {
            width: 100%;
            max-width: 80%;
            height: 900px;
            background-color: #FFFCF3;
            padding: 30px;
            border-radius: 12px;
            display: flex;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .assistant { width: 300px; flex: 0 0 auto; }
        .container { width: calc(90% - 300px); flex: 0 1 auto; }

        h1 { font-size:18px; }
        .menu-item { margin-bottom: 15px; color: #ccc; cursor: pointer; }
        .menu-item:hover { color: white; }
        h2 { font-size:16px; }
        h3 { font-size:14px; }
        html{ font-size:12px; height:100%; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h3>My Project</h3>
        <div class="menu-item">🏠 ホーム</div>
        <div class="menu-item">📂 <a href="">可視化する</a></div>
        <div class="menu-item">⚙️ <a href="settings.html">設定</a></div>
    </nav>

    <main id="main-content">
        <h1>検索したいデータがどこにあるか探しましょう</h1>

        <div class="first-message-area">
            <h3>基本の質問例</h3>
            <ul>
                <li>「販売金額」を探して</li>
            </ul>
            <h3>バリエーションの質問例</h3>
            <ul>
                <li>売上金額または販売金額を探して</li>
                <li>スキーマ=DEMOで、販売金額の列</li>
                <li>通貨=USDまたは明細粒度の列を探して</li>
            </ul>
        </div>
        <p/>
        <div class="user-content-area">
            <oracle-dv class="container" project-path="/users/takanobu.yoshikawa@oracle.com/AI Agent/CatalogSearch_WB" project-options='{"bShowFilterBar":false}'>
            </oracle-dv>
            <oracle-analytics-assistant
                class="assistant"
                id="oaAssistant"
                src-data="[&quot;XSA('takanobu.yoshikawa@oracle.com'.'CatalogSearch')&quot;]">
            </oracle-analytics-assistant>
            <script>
                oracle.oa.embedding.ready().then(oApp => oApp.applyBindings());
            </script>
        </div>
        <script>
            requirejs(['knockout', 'ojs/ojcore', 'ojs/ojknockout', 'ojs/ojcomposite', 'jet-composites/oracle-dv/loader'], function(ko) {   ko.applyBindings();
            });
        </script>
    </main>
</body>
</html>
